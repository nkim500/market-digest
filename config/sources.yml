# Top-level ceiling on how far back any fetcher reaches on a single run.
# If a (source, ticker) watermark is older than this, the fetcher only
# looks back this many days. 7 = "I only care about what's new".
max_lookback_days: 7

insiders:
  sec_form4:
    enabled: true
    # SEC policy requires a contact User-Agent. Fetcher fails loudly if this
    # env var is unset or still contains the placeholder phrase.
    user_agent_env: SEC_USER_AGENT

  finnhub:
    enabled: true
    # Free tier: 60 req/min. If unset, the fetcher logs info-level and skips
    # this source (non-fatal).
    api_key_env: FINNHUB_API_KEY

  quiver:
    enabled: false    # infra ready; to activate: flip this + set QUIVER_API_KEY
    api_key_env: QUIVER_API_KEY

alert_rules:
  watchlist_hit:    { severity: watch }
  amount_over_500k: { severity: watch }
  amount_over_1m:   { severity: act }
  cluster_3_in_7d:  { severity: watch }

http:
  timeout_seconds: 30
  max_retries: 3
  backoff_ms: 1000
