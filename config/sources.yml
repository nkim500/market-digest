insiders:
  senate:
    url: "https://raw.githubusercontent.com/timothycarambat/senate-stock-watcher-data/master/aggregate/all_transactions.json"
    enabled: true
  house:
    # No maintained community JSON mirror exists at the moment. The canonical
    # source is the House Clerk's FD.zip (XML) at disclosures-clerk.house.gov;
    # wiring that up requires a custom fetcher. Leave disabled until someone
    # writes one, or drop in a different mirror here if one surfaces.
    url: ""
    enabled: false
  sec_form4:
    url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=4&output=atom"
    enabled: false
    user_agent: "market-digest <your-email@example.com>"

alert_rules:
  watchlist_hit:    { severity: watch }
  amount_over_500k: { severity: watch }
  amount_over_1m:   { severity: act }
  cluster_3_in_7d:  { severity: watch }

http:
  timeout_seconds: 30
  max_retries: 3
  backoff_ms: 1000
