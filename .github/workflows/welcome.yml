name: Welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: |
            Welcome to market-digest, @${{ github.actor }}! Thanks for your first PR.

            A few things to know:
            - Tests will run automatically — check the status below
            - Read [CONTRIBUTING.md](https://github.com/nkim500/market-digest/blob/main/CONTRIBUTING.md) if you haven't
            - This is a personal / fork-friendly tool; if you're forking, just do it

            We'll review your PR soon.
          issue-message: |
            Thanks for opening your first issue, @${{ github.actor }}! We'll take a look soon.

            In the meantime, see [docs/getting-started.md](https://github.com/nkim500/market-digest/blob/main/docs/getting-started.md) for setup.
