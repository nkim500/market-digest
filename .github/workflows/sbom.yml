name: SBOM Generation
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  sbom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          artifact-name: market-digest-sbom.spdx.json
          format: spdx-json
          output-file: market-digest-sbom.spdx.json

      - name: Upload SBOM to release
        # anchore/sbom-action auto-uploads when running in a release context,
        # so the asset may already exist; --clobber keeps the step idempotent.
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} market-digest-sbom.spdx.json --clobber
